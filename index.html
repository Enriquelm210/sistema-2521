<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>25|21 - Nuestra Historia</title>
    <link href="https://unpkg.com/nes.css@latest/css/nes.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="sakura-container"></div>
    <audio id="bg-music" loop>
        <source src="assets/Your Existence Inst..mp3" type="audio/mpeg">
    </audio>

    <div class="main-layout">
        <div class="recorder-container">
            <div id="kike-box" class="avatar-wrapper hidden kike-side">
                <div class="speech-bubble" id="bubble-kike"></div>
                <img src="assets/kikeavatar.png" class="avatar" id="kike-btn">
            </div>

            <img src="assets/radio-fondo.png" class="radio-atlas">
            
            <div class="recorder-interface">
                <div class="screen-area">
                    <img id="scene-img" src="">
                    <div id="snoopy-egg" class="snoopy-trigger snoopy-float hidden">
                        <img src="assets/snoopy.png" alt="Snoopy">
                    </div>
                    <div class="subtitle-box">
                        <p id="typewriter-text"></p>
                    </div>
                </div>
            </div>

            <div id="mer-box" class="avatar-wrapper hidden mer-side">
                <div class="speech-bubble" id="bubble-mer"></div>
                <img src="assets/meravatar.png" class="avatar" id="mer-btn">
            </div>
        </div>

        <div id="side-panel">
            <p class="panel-label">CONTROLES</p>
            <div id="options-container"></div>
        </div>
    </div>

    <dialog class="nes-dialog is-rounded" id="dialog-snoopy">
        <form method="dialog">
            <p class="title" id="modal-achievement-title"></p>
            <p id="modal-content-text"></p>
            <menu class="dialog-menu">
                <button class="nes-btn is-primary" id="btn-close-modal">ENTENDIDO</button>
            </menu>
        </form>
    </dialog>

    <div id="achievement-popup">
        <p style="color: #f20d9e; margin-bottom: 5px;">🏆 ¡LOGRO DESBLOQUEADO!</p>
        <p id="achievement-name"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
